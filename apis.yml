apis:
  - aid: mitmproxy:mitmproxy
    name: Mitmproxy
    description: >-
      mitmproxy is a free and open source interactive HTTPS proxy for
      intercepting, inspecting, modifying, and replaying HTTP and HTTPS traffic.
      It provides console-based, web-based, and command-line interfaces for
      working with network traffic flows.
    humanURL: https://mitmproxy.org
    tags:
      - HTTPS Proxy
      - Traffic Interception
      - HTTP Debugging
      - API Testing
      - Traffic Analysis
    properties:
      - type: Documentation
        url: https://docs.mitmproxy.org/stable/
      - type: GettingStarted
        url: https://docs.mitmproxy.org/stable/overview-getting-started/
      - type: GitHubOrganization
        url: https://github.com/mitmproxy/mitmproxy
      - type: Installation
        url: https://docs.mitmproxy.org/stable/overview-installation/
  - aid: mitmproxy:mitmweb
    name: Mitmweb
    description: >-
      mitmweb is the web-based interface for mitmproxy, providing a graphical
      user interface in the browser for intercepting and inspecting HTTP and
      HTTPS traffic flows.
    humanURL: https://docs.mitmproxy.org/stable/overview-tools/#mitmweb
    tags:
      - Web Interface
      - HTTPS Proxy
      - Traffic Inspection
    properties:
      - type: Documentation
        url: https://docs.mitmproxy.org/stable/overview-tools/#mitmweb
  - aid: mitmproxy:mitmdump
    name: Mitmdump
    description: >-
      mitmdump is the command-line companion to mitmproxy, providing
      tcpdump-like functionality for HTTP and HTTPS traffic. It can be used for
      scripted traffic manipulation and automated testing workflows.
    humanURL: https://docs.mitmproxy.org/stable/overview-tools/#mitmdump
    tags:
      - Command Line
      - Traffic Dump
      - Scripting
    properties:
      - type: Documentation
        url: https://docs.mitmproxy.org/stable/overview-tools/#mitmdump
