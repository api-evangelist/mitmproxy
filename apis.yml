aid: mitmproxy
name: Mitmproxy
description: >-
  mitmproxy is a free and open source interactive HTTPS proxy that allows
  developers and security researchers to intercept, inspect, modify, and replay
  HTTP and HTTPS traffic flows. It includes mitmproxy (interactive console),
  mitmweb (web-based interface), and mitmdump (command-line tool), providing
  powerful capabilities for debugging, testing, and analyzing API traffic and
  web applications.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - HTTPS Proxy
  - Traffic Interception
  - HTTP Debugging
  - API Testing
  - Traffic Analysis
  - Security Testing
  - Open Source
